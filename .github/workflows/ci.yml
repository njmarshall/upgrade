name: CI — API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Write local config from secrets
        run: |
          cat > src/test/resources/config.local.properties << EOF
          api.loanapp.url=${{ secrets.API_LOANAPP_URL }}
          ui.loanapp.url=${{ secrets.UI_LOANAPP_URL }}
          testdata.existing.loan.app.id=${{ secrets.EXISTING_LOAN_APP_ID }}
          testdata.nonexisting.loan.app.id=${{ secrets.NONEXISTING_LOAN_APP_ID }}
          browser.headless=true
          EOF

      - name: Build and run API tests
        run: mvn -Dtest=LoadAppApiTest test --no-transfer-progress

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
